const CSMS = ["Amy Nguyen", "Blake Bueltel", "Breanna Thompson", "Caitlin Kimball", "Jorie Stavropoulos", "Leslie Esch", "Ryan Wallace", "Steven White", "Taylor Lutcher", "Trisha Kes"];

function fmt(v, isDollar=true) {
  if (!v || v === 0) return '<span class="null-cell">—</span>';
  const absV = Math.abs(v);
  if (isDollar) {
    if (absV >= 1e6) return '$' + (v/1e6).toFixed(2) + 'M';
    if (absV >= 1000) return '$' + (v/1000).toFixed(0) + 'K';
    return '$' + Math.round(v).toLocaleString();
  } else {
    if (absV >= 1e6) return (v/1e6).toFixed(1) + 'M';
    if (absV >= 1000) return (v/1000).toFixed(0) + 'K';
    return Math.round(v).toLocaleString();
  }
}

// Populate CSM dropdown
const csmSel = document.getElementById('csmFilter');
CSMS.forEach(c => {
  const opt = document.createElement('option');
  opt.value = c; opt.text = c;
  csmSel.appendChild(opt);
});

function onCsmChange() {
  const csm = csmSel.value;
  document.getElementById('backBtn').classList.toggle('visible', !!csm);
  render();
}

function clearCsm() {
  csmSel.value = '';
  document.getElementById('backBtn').classList.remove('visible');
  render();
}

// Aggregate rows by CSM
function aggregateByCsm(rows) {
  const map = {};
  rows.forEach(r => {
    if (!map[r.csm]) map[r.csm] = {csm: r.csm, avg_els: 0, regs: 0, tps: 0, unique_touched: 0, y1: 0, rnwl: 0, other: 0, total: 0, client_count: 0};
    const m = map[r.csm];
    m.avg_els += r.avg_els || 0;
    m.regs += r.regs || 0;
    m.tps += r.tps || 0;
    m.unique_touched += r.unique_touched || 0;
    m.y1 += r.y1 || 0;
    m.rnwl += r.rnwl || 0;
    m.other += r.other || 0;
    m.total += r.total || 0;
    m.client_count++;
  });
  return Object.values(map).sort((a,b) => (b.total||0) - (a.total||0));
}

function renderKPIs(rows, isCsm) {
  const totELs = rows.reduce((s,r)=>s+(r.avg_els||0), 0);
  const totRegs = rows.reduce((s,r)=>s+(r.regs||0), 0);
  const totTPs = rows.reduce((s,r)=>s+(r.tps||0), 0);
  const totIR = rows.reduce((s,r)=>s+(r.total||0), 0);
  const totY1 = rows.reduce((s,r)=>s+(r.y1||0), 0);
  const totRnwl = rows.reduce((s,r)=>s+(r.rnwl||0), 0);
  const nClients = isCsm ? new Set(rows.map(r=>r.ck)).size : rows.length;
  document.getElementById('kpiRow').innerHTML = `
    <div class="kpi"><div class="kpi-label">Clients</div><div class="kpi-value">${nClients}</div></div>
    <div class="kpi"><div class="kpi-label">Total IR YTD</div><div class="kpi-value">${fmt(totIR)}</div></div>
    <div class="kpi"><div class="kpi-label">Y1 Case Rate IR</div><div class="kpi-value">${fmt(totY1)}</div></div>
    <div class="kpi"><div class="kpi-label">Renewal IR</div><div class="kpi-value">${fmt(totRnwl)}</div></div>
    <div class="kpi"><div class="kpi-label">Growth TPs</div><div class="kpi-value">${fmt(totTPs, false)}</div></div>
    <div class="kpi"><div class="kpi-label">Regs</div><div class="kpi-value">${fmt(totRegs, false)}</div></div>
  `;
}

function render() {
  const csm = csmSel.value;

  if (!csm) {
    // ── CSM-aggregated view ──
    const agg = aggregateByCsm(ALL_ROWS);
    renderKPIs(ALL_ROWS, false);
    document.getElementById('rowCount').textContent = agg.length + ' CSMs · click to drill in';

    document.getElementById('tableHead').innerHTML = `
      <tr>
        <th class="left">CSM</th>
        <th># Clients</th>
        <th>Avg ELs</th>
        <th>Regs YTD</th>
        <th>Growth TPs</th>
        <th>Unique Touched</th>
        <th>Y1 Case Rate IR</th>
        <th>Renewal IR</th>
        <th>Other IR</th>
        <th>Total IR</th>
      </tr>`;

    const totals = agg.reduce((t,r)=>{t.avg_els+=r.avg_els;t.regs+=r.regs;t.tps+=r.tps;t.unique_touched+=r.unique_touched;t.y1+=r.y1;t.rnwl+=r.rnwl;t.other+=r.other;t.total+=r.total;t.client_count+=r.client_count;return t;},{avg_els:0,regs:0,tps:0,unique_touched:0,y1:0,rnwl:0,other:0,total:0,client_count:0});

    document.getElementById('tableBody').innerHTML =
      agg.map(r => `
        <tr class="clickable" onclick="drillInto('${r.csm.replace(/'/g,"\\'")}')">
          <td class="left"><span class="csm-name">${r.csm}</span><span class="drill-hint">▶ expand</span></td>
          <td>${r.client_count}</td>
          <td>${fmt(r.avg_els, false)}</td>
          <td>${fmt(r.regs, false)}</td>
          <td>${fmt(r.tps, false)}</td>
          <td>${fmt(r.unique_touched, false)}</td>
          <td>${fmt(r.y1)}</td>
          <td>${fmt(r.rnwl)}</td>
          <td>${fmt(r.other)}</td>
          <td><b>${fmt(r.total)}</b></td>
        </tr>
      `).join('') +
      `<tr class="total-row">
        <td class="left"><b>Total</b></td>
        <td><b>${totals.client_count}</b></td>
        <td><b>${fmt(totals.avg_els, false)}</b></td>
        <td><b>${fmt(totals.regs, false)}</b></td>
        <td><b>${fmt(totals.tps, false)}</b></td>
        <td><b>${fmt(totals.unique_touched, false)}</b></td>
        <td><b>${fmt(totals.y1)}</b></td>
        <td><b>${fmt(totals.rnwl)}</b></td>
        <td><b>${fmt(totals.other)}</b></td>
        <td><b>${fmt(totals.total)}</b></td>
      </tr>`;

  } else {
    // ── Client-expanded view for selected CSM ──
    const filtered = ALL_ROWS.filter(r => r.csm === csm).sort((a,b) => (b.total||0) - (a.total||0));
    renderKPIs(filtered, true);
    document.getElementById('rowCount').textContent = filtered.length + ' clients';

    document.getElementById('tableHead').innerHTML = `
      <tr>
        <th class="left">Client</th>
        <th class="left">Sub-Client</th>
        <th>Avg ELs</th>
        <th>Regs YTD</th>
        <th>Growth TPs</th>
        <th>Unique Touched</th>
        <th>Y1 Case Rate IR</th>
        <th>Renewal IR</th>
        <th>Other IR</th>
        <th>Total IR</th>
      </tr>`;

    const totals = filtered.reduce((t,r)=>{t.avg_els+=r.avg_els||0;t.regs+=r.regs||0;t.tps+=r.tps||0;t.unique_touched+=r.unique_touched||0;t.y1+=r.y1||0;t.rnwl+=r.rnwl||0;t.other+=r.other||0;t.total+=r.total||0;return t;},{avg_els:0,regs:0,tps:0,unique_touched:0,y1:0,rnwl:0,other:0,total:0});

    document.getElementById('tableBody').innerHTML =
      filtered.map(r => `
        <tr>
          <td class="left">${r.client_name}</td>
          <td class="left">${r.sub_client || '<span class="null-cell">—</span>'}</td>
          <td>${fmt(r.avg_els, false)}</td>
          <td>${fmt(r.regs, false)}</td>
          <td>${fmt(r.tps, false)}</td>
          <td>${fmt(r.unique_touched, false)}</td>
          <td>${fmt(r.y1)}</td>
          <td>${fmt(r.rnwl)}</td>
          <td>${fmt(r.other)}</td>
          <td><b>${fmt(r.total)}</b></td>
        </tr>
      `).join('') +
      `<tr class="total-row">
        <td class="left"><b>Total</b></td>
        <td></td>
        <td><b>${fmt(totals.avg_els, false)}</b></td>
        <td><b>${fmt(totals.regs, false)}</b></td>
        <td><b>${fmt(totals.tps, false)}</b></td>
        <td><b>${fmt(totals.unique_touched, false)}</b></td>
        <td><b>${fmt(totals.y1)}</b></td>
        <td><b>${fmt(totals.rnwl)}</b></td>
        <td><b>${fmt(totals.other)}</b></td>
        <td><b>${fmt(totals.total)}</b></td>
      </tr>`;
  }
}

function drillInto(csmName) {
  csmSel.value = csmName;
  document.getElementById('backBtn').classList.add('visible');
  render();
}

// Init
render();
</script>
</body>
</html>
